name: Enemy Regression Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  long-run-regression:
    name: 5k/20k Multi-Map Multi-Seed Gate
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: "1"
      SDL_VIDEODRIVER: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OS libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenal1 libsdl2-2.0-0 libglu1-mesa libgomp1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pygame pynput vizdoom
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch

      - name: Build enemy backend mod
        run: python build_enemy_nn_mod.py

      - name: Run mandatory release gate
        run: |
          python run_enemy_regression.py --wad DOOM.WAD --enemy-backend-mod enemy_nn_backend_mod.pk3 2>&1 | tee enemy_regression.log

      - name: Upload regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enemy-regression-log
          path: enemy_regression.log
